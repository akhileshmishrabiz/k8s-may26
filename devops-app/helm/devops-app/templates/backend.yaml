apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ include "devops-app.namespace" . }}
  labels:
    {{- include "devops-app.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "devops-app.selectorLabels" (dict "component" "backend") | nindent 6 }}
  strategy:
    type: {{ .Values.backend.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.backend.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.backend.strategy.rollingUpdate.maxUnavailable }}
  template:
    metadata:
      labels:
        {{- include "devops-app.selectorLabels" (dict "component" "backend") | nindent 8 }}
    spec:
      initContainers:
      - name: wait-for-db
        image: "{{ .Values.backend.initContainer.image.repository }}:{{ .Values.backend.initContainer.image.tag }}"
        imagePullPolicy: {{ .Values.backend.initContainer.image.pullPolicy }}
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "devops-app.secretName" . }}
              key: DB_PASSWORD
        command:
        - sh
        - -c
        - |
          until pg_isready -h {{ include "devops-app.postgresServiceName" . }} -p {{ .Values.postgres.service.clusterIP.port }} -U {{ .Values.secrets.stringData.DB_USERNAME }}; do
            echo waiting for postgres...
            sleep 2
          done
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.targetPort }}
        env:
        - name: ALLOWED_ORIGINS
          value: {{ .Values.backend.allowedOrigins | quote }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "devops-app.secretName" . }}
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "devops-app.secretName" . }}
              key: SECRET_KEY
        - name: FLASK_DEBUG
          valueFrom:
            configMapKeyRef:
              name: {{ include "devops-app.configMapName" . }}
              key: FLASK_DEBUG
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ include "devops-app.namespace" . }}
  labels:
    {{- include "devops-app.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  selector:
    {{- include "devops-app.selectorLabels" (dict "component" "backend") | nindent 4 }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
  type: {{ .Values.backend.service.type }}
