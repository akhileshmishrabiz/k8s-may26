apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-app.secretName" . }}
  namespace: {{ include "devops-app.namespace" . }}
  labels:
    {{- include "devops-app.labels" (dict "root" . "component" "db-secrets") | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.stringData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
