name: DevSecOps Code1
# run unit tests + container scans
# app language -> python -> devsecops/src
on:
  # pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.13'
  CODE_PATH: devsecops/src
  IMAGE_NAME: devsecops-app

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # checkout the branch that triggered this run (needed for auto-push)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # install python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # auto-format code in place, then push back to the same branch
      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format ${{ env.CODE_PATH }}"

      - name: Commit and push ruff formatting
        # skip when this run was triggered by the bot's own format commit
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.CODE_PATH }}"
          if git diff --staged --quiet; then
            echo "No formatting changes to commit."
          else
            git commit -m "style: auto-format with ruff [skip ci]"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi

      # lint stays as a check — formatting is auto-fixed, lint errors still fail the job
      - name: Ruff lint
        uses: astral-sh/ruff-action@v4.0.0
        with:
          src: ${{ env.CODE_PATH }}

      # install dependencies and run unit tests
      # setup for unit tests -> find the tool used for writing tests in app
      # pytest -> so setup pytest and other dependencies for pytest
      # - name: unit tests
      #   env:
      #     DB_LINK: "sqlite:///:memory:"
      #   run: |
      #     cd ${{ env.CODE_PATH }}
      #     python -m venv .venv
      #     source .venv/bin/activate
      #     pip install -r requirements.txt
      #     pytest --cov=app --cov-report=xml --cov-report=term-missing

      # fast critical-path checks after full unit tests (pytest -m smoke)
      - name: smoke tests
        env:
          DB_LINK: "sqlite:///:memory:"
        run: |
          cd ${{ env.CODE_PATH }}
          source .venv/bin/activate
          pytest -m smoke -v

      # scan Dockerfile for best-practice and security issues (hadolint)
      - name: Scan Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ env.CODE_PATH }}/Dockerfile
          # log warnings (e.g. unpinned apk versions) but fail only on errors
          failure-threshold: error
          ignore: DL3018

      # build the container image locally for scanning (not pushed)
      - name: Build container image
        run: docker build -t ${{ env.IMAGE_NAME }}:ci ${{ env.CODE_PATH }}

      # scan built image for OS and dependency vulnerabilities (trivy)
      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          format: table
          severity: CRITICAL,HIGH
          vuln-type: 'os,library'
          exit-code: 1
          ignore-unfixed: true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: unit tests
        env:
          DB_LINK: "sqlite:///:memory:"
        run: |
          cd ${{ env.CODE_PATH }}
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pytest --cov=app --cov-report=xml --cov-report=term-missing