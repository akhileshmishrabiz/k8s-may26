name: E-commerce dev deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 879381241087.dkr.ecr.ap-south-1.amazonaws.com
  core_path: multi-env-eks-stuff/eks-microservices

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: dev-ecommerce-product-service
            ecr_repo: dev-ecommerce-product-service
            path: app/services/product-service/
          - name: dev-ecommerce-user-service
            ecr_repo: dev-ecommerce-user-service
            path: app/services/user-service/
          - name: dev-ecommerce-cart-service
            ecr_repo: dev-ecommerce-cart-service
            path: app/services/cart-service/
          - name: dev-ecommerce-order-service
            ecr_repo: dev-ecommerce-order-service
            path: app/services/order-service/
          - name: dev-ecommerce-payment-service
            ecr_repo: dev-ecommerce-payment-service
            path: app/services/payment-service/
          - name: dev-ecommerce-notification-service
            ecr_repo: dev-ecommerce-notification-service
            path: app/services/notification-service/
          - name: dev-ecommerce-api-gateway
            ecr_repo: dev-ecommerce-api-gateway
            path: app/api-gateway/
          - name: dev-ecommerce-frontend
            ecr_repo: dev-ecommerce-frontend
            path: app/frontend/

          - name: dev-ecommerce-seed
            ecr_repo: dev-ecommerce-seed
            path: app/seed-job/

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::879381241087:role/aws-github-oidc-march26
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.core_path }}/${{ matrix.service.path }}
          push: false
          load: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push ${{ matrix.service.name }}
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service.ecr_repo }}:latest

  update-helm-values:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout argo-dev branch
        uses: actions/checkout@v4
        with:
          ref: argo-dev
          fetch-depth: 0

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Helm values and push to argo-dev
        run: |
          IMAGE_TAG="${{ github.sha }}"
          VALUES_FILE="multi-env-eks-stuff/eks-microservices/environments/dev/value.yaml"

          yq -i '.services.productService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-product-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.services.userService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-user-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.services.cartService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-cart-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.services.orderService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-order-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.services.paymentService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-payment-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.services.notificationService.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-notification-service:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.apiGateway.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-api-gateway:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.frontend.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-frontend:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.seedJob.image = "'"${{ env.ECR_REGISTRY }}/dev-ecommerce-seed:${IMAGE_TAG}"'"' $VALUES_FILE
          yq -i '.global.imagePullPolicy = "IfNotPresent"' $VALUES_FILE

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_FILE"
          git commit -m "chore: update image tags to ${IMAGE_TAG}" || echo "No changes"
          git push origin argo-dev

  