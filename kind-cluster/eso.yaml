apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: default
type: Opaque
stringData:
  token: "root"        # the Vault root token (dev mode default)
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"  # in-cluster Vault address
      path: "secret"        # the KV mount
      version: "v2"         # kv-v2
      auth:
        tokenSecretRef:
          name: vault-token   # the K8s secret holding the token
          key: token          # the field inside that secret